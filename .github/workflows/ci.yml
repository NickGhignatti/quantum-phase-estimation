name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Lint
        run: uv run ruff check src tests

      - name: Run tests
        run: uv run pytest tests -v

  notebooks:
    name: Notebooks execute
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      # Only the simulator notebooks run here. 03_hardware.ipynb is excluded: it needs
      # IBM Quantum credentials and would queue on real hardware. It reads committed
      # results from data/ so it still renders for a reader without an account.
      - name: Execute notebooks
        run: |
          uv run pytest --nbmake \
            notebooks/01_theory.ipynb \
            notebooks/02_qpe_qiskit.ipynb \
            notebooks/04_hhl.ipynb
